<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG 诊断追踪</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="page">
  <div class="container" style="margin-top:32px;">
    <div class="page-header">
      <h1>&#x1F50D; RAG 全链路诊断追踪</h1>
      <a class="back" href="index.html">&larr; 返回首页</a>
    </div>

    <div class="panel">
      <h2><span class="step">0</span> 输入查询</h2>
      <div class="input-row">
        <textarea id="query" placeholder="例如：压缩机压力过高报警怎么办？" style="min-height:56px;"></textarea>
        <div class="slider">
          <label for="topK">Top-K：</label>
          <input type="range" id="topK" min="1" max="10" value="5" style="width:140px;" />
          <span id="topKVal">5</span>
        </div>
        <input type="text" id="sessionId" placeholder="session id (可选)" style="width:180px;" />
        <button class="btn" id="btnRun">执行追踪</button>
      </div>
      <div class="status" id="status">&nbsp;</div>
      <div id="quickRow" style="margin-top:10px;font-size:12px;color:var(--muted);"></div>
    </div>

    <div id="traceContainer"></div>
  </div>
  <script src="js/common.js"></script>
  <script src="js/trace.js"></script>
</body>
</html>
